spring.datasource.url=jdbc:postgresql://db:5432/onthemoney
spring.datasource.username=${DB_USER:app}
spring.datasource.password=${DB_PASSWORD:devpassword}
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.datasource.hikari.maximum-pool-size=5

server.address=0.0.0.0
server.port=8080

plaid.client-id=${PLAID_CLIENT_ID:}
plaid.secret=${PLAID_SECRET:}
plaid.env=${PLAID_ENV:production}
plaid.redirect-uri=${PLAID_REDIRECT_URI:https://onthemoney.site/api/plaid/oauth-callback}

finnhub.api-key=${FINNHUB_API_KEY:}

API_KEY=${API_KEY:}
ENCRYPTION_KEY=${ENCRYPTION_KEY:}
JWT_SECRET=${JWT_SECRET:}
TOTP_ISSUER=${TOTP_ISSUER:OnTheMoney}
