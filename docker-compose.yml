services:
  db:
    image: postgres:16-alpine
    container_name: onthemoney-db
    environment:
      POSTGRES_DB: onthemoney
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d onthemoney"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: onthemoney-app
    environment:
      DB_PASSWORD: ${DB_PASSWORD}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/onthemoney
      ENGINE_BINARY_PATH: /app/run_engine
      PLAID_CLIENT_ID: ${PLAID_CLIENT_ID}
      PLAID_SECRET: ${PLAID_SECRET}
      PLAID_ENV: ${PLAID_ENV:-production}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY}
      API_KEY: ${API_KEY}
      PLAID_REDIRECT_URI: ${PLAID_REDIRECT_URI:-}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: onthemoney-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    restart: unless-stopped

volumes:
  pgdata:
