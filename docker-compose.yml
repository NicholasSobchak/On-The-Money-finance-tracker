services:
  db:
    image: postgres:16-alpine
    container_name: onthemoney-db
    env_file: .env
    environment:
      POSTGRES_DB: onthemoney
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d onthemoney"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: onthemoney-app
    env_file: .env
    environment:
      DB_PASSWORD: ${DB_PASSWORD}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/onthemoney
      ENGINE_BINARY_PATH: /app/run_engine
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
