# .github/workflows/ci.yml
name: Build & Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  VCPKG_ROOT: ${{ github.workspace }}/engine/vcpkg
  VCPKG_REF: 2026.04.08

jobs:
  engine:
    name: C++ Engine
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: engine

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install C++ Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential

    - name: Check C++ Formatting
      run: find . -path ./vcpkg -prune -o -type f \( -name "*.cpp" -o -name "*.h" \) -print | xargs clang-format-17 --dry-run --Werror

    - name: Cache vcpkg binary cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/vcpkg/archives
        key: vcpkg-${{ runner.os }}-${{ env.VCPKG_REF }}-${{ hashFiles('engine/vcpkg.json') }}
        restore-keys: vcpkg-

    - name: Bootstrap Vcpkg
      run: |
        if [ ! -x "${VCPKG_ROOT}/vcpkg" ]; then
          rm -rf "${VCPKG_ROOT}"
          git clone --branch "${VCPKG_REF}" --depth 1 https://github.com/microsoft/vcpkg.git "${VCPKG_ROOT}"
          "${VCPKG_ROOT}/bootstrap-vcpkg.sh" -disableMetrics
        fi

    - name: Install C++ Dependencies with Vcpkg
      run: "${VCPKG_ROOT}/vcpkg" install --triplet x64-linux

    - name: Configure CMake
      run: cmake -S . -B build -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake"

    - name: Build C++ Project
      run: cmake --build build

    - name: Run C++ Tests
      run: ctest --test-dir build --output-on-failure
