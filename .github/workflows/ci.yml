name: Build & Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  cpp-build-and-test:
    runs-on: ubuntu-latest

    env:
      CLANG_FORMAT_VERSION: "17"
      VCPKG_REF: "2026.04.27"

    defaults:
      run:
        working-directory: engine

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install C++ Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build build-essential clang-format-${CLANG_FORMAT_VERSION}

    - name: Check C++ Formatting
      run: find src include tests -type f \( -name "*.cpp" -o -name "*.h" \) -exec clang-format-${CLANG_FORMAT_VERSION} --dry-run --Werror {} +

    - name: Cache vcpkg binary cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/vcpkg/archives
        key: vcpkg-${{ runner.os }}-${{ env.VCPKG_REF }}-${{ hashFiles('engine/vcpkg.json') }}
        restore-keys: |
          vcpkg-${{ runner.os }}-${{ env.VCPKG_REF }}-
          vcpkg-${{ runner.os }}-

    - name: Cache vcpkg installation
      uses: actions/cache@v4
      with:
        path: engine/vcpkg
        key: vcpkg-tool-${{ runner.os }}-${{ env.VCPKG_REF }}

    - name: Bootstrap Vcpkg
      run: |
        if [ ! -x vcpkg/vcpkg ]; then
          rm -rf vcpkg
          git clone --branch "${VCPKG_REF}" --depth 1 https://github.com/microsoft/vcpkg.git vcpkg
          ./vcpkg/bootstrap-vcpkg.sh -disableMetrics
        fi

    - name: Install C++ Dependencies with Vcpkg
      run: ./vcpkg/vcpkg install --triplet x64-linux

    - name: Configure CMake
      run: cmake -B build -S . -G Ninja -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/engine/vcpkg/scripts/buildsystems/vcpkg.cmake

    - name: Build C++ Project
      run: cmake --build build

    - name: Run C++ Tests
      run: ctest --test-dir build --output-on-failure

  java-api-build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build Java API
      run: ./gradlew build

    - name: Run OWASP Dependency Check
      run: ./gradlew dependencyCheckAnalyze
      continue-on-error: true

    - name: Upload Security Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: dependency-check-report
        path: app/build/reports/dependency-check-report.html
        retention-days: 30
